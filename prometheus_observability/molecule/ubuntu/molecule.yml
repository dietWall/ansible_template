---
dependency:
  name: galaxy
driver:
  name: default # <-- WICHTIG: "delegated" zwingt Molecule dazu, deine create.yml zu nutzen!
platforms:
  - name: docker-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    cgroupns_mode: host
    pre_build_image: true
provisioner:
  name: ansible
verifier:
  name: ansible
