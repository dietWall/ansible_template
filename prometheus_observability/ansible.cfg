[defaults]
# Output and logging configuration
#callback_result_format = yaml
#display_failed_stderr = true

# Verbose output
verbosity = 0

# JSON output (for molecule)
bin_ansible_callbacks = yes

# Connection timeouts
timeout = 30

# Retry behavior
retry_files_enabled = yes
retry_files_save_path = ~/.ansible/retry

# Color output
color = yes

# Logging
#log_path = /home/dw/code/ansible_foundation/logs/ansible.log
#log_filter = ERROR

# Fact caching (disable for now)
fact_caching = memory

# Host key checking
host_key_checking = no

[ssh_connection]
# SSH control path
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
control_path_ssh = /tmp/ansible-ssh-%%h-%%p-%%r

# Pipelining
pipelining = yes

# Transport
scp_if_ssh = hard

