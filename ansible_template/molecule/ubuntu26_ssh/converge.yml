---
- name: Converge - Run Demo Role
  hosts: all
  gather_facts: false  # Sammelt die Ubuntu-Systemdaten vor dem Rollenstart
  vars:
    demo_detailed: "{{ demo_detailed_raw | default('false') | bool }}"
  # vault is defined in molecule.yml -> no need to have it here
  pre_tasks:
    - name: Verify if password exists
      ansible.builtin.debug:
        msg: >
          {% if vault_ubuntu_password is defined and vault_ubuntu_password | length > 0 %}
          Password loaded and available
          {% else %}
          WARNING: Password is missing or empty!
          {% endif %}

    - name: Dump effective Ansible Roles Path
      ansible.builtin.shell: >-
        ansible-config dump | grep DEFAULT_ROLES_PATH | sed 's/\\x1b\\[[0-9;]*m//g'
      args:
        executable: /bin/bash
      register: config_dump
      changed_when: false

    - name: "print internals"
      ansible.builtin.debug:
        msg: |
          "Print demo_detailed:  {{ demo_detailed | default('UNDEFINED') }}"
          "type of the variable: {{ demo_detailed | type_debug }}"
          "Print role path: {{ config_dump.stdout }}"
  roles:
    - role: demo
    - role: ssh_keys
  tasks: