---
# Docker host configuration
docker_host_ip: "172.17.0.1"
docker_host_user: "ubuntu"

# SSH verification commands to run on connected hosts
ssh_verify_commands:
  - whoami
  - pwd
  - ls -la
  - id

# Ansible configuration
ansible_python_interpreter: "{{ ansible_env.PATH }}/python"
ansible_connection: ssh
ansible_user: "{{ docker_host_user }}"
ansible_become: true
ansible_become_method: sudo

# Network configuration
ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ConnectTimeout=10'