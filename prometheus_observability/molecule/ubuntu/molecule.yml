---
# ==============================================================================
# MOLECULE SCENARIO CONFIGURATION: Ubuntu 26.04 Sandbox (Docker Platform)
# ==============================================================================
# Purpose:
# This file defines a local testing environment (sandbox) for an Ansible role
# using a systemd-enabled Ubuntu 26.04 Docker container. It emulates a real
# physical/virtual machine by launching systemd as PID 1 and preparing an
# SSH server inside the container.
#
# This setup contains all required configurations to start an image with systemd enabled
# ==============================================================================

dependency:
  name: galaxy
  enabled: false # Disables warnings about missing requirements.yml/collections.yml
driver:
  name: docker
platforms:
  - name: ubuntu26-sandbox
    image: geerlingguy/docker-ubuntu2604-ansible:latest

    # FIX: Bypasses argument validation bugs between modern Ansible-Core and
    # the Molecule-Docker plugin's internal build-playbook. Tells Molecule
    # that the image is ready to download and does not need local rebuilding.
    pre_build_image: true

    command: /lib/systemd/systemd
    privileged: true

    # FIX: systemd inside the container requires direct write access to the host's
    # control groups (cgroups) to manage services. This bind-mount exposes the
    # virtual cgroup filesystem from the host into the container so systemd
    # does not crash with Exit Code 255 during bootup.
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

    cgroupns_mode: host
    # Opens the SSH port to the host system for later manual testing
    published_ports:
      - 0.0.0.0:2222:22/tcp
    # Forces Molecule to communicate internally via Docker API instead of SSH
    connection: docker

    # deactivates warnings about python interpreter might change
    ansible_python_interpreter: auto_silent
provisioner:
  name: ansible
  env:
    # Forces Ansible to use /tmp directory instead of the root user's home folder.
    # This prevents early permission bottlenecks during container boot-up.
    ANSIBLE_REMOTE_TMP: /tmp
    # Role search path: this declaration overwrites molecule.yml and ansible.cfg
    # since we want to have a global declaration for this role, this is commented out, but kept as future reference
    # ANSIBLE_ROLES_PATH: "$MOLECULE_EPHEMERAL_DIRECTORY/roles:$MOLECULE_PROJECT_DIRECTORY/roles:../../roles"
    ANSIBLE_CALLBACK_RESULT_FORMAT: "yaml"
    ANSIBLE_DISPLAY_FAILED_STDERR: "true"
    # Forces Molecule/Ansible to use the centralized ansible.cfg
    # instead of the auto-generated file inside the temporary cache folder.
    ANSIBLE_CONFIG: "$MOLECULE_PROJECT_DIRECTORY/ansible.cfg"
    # FIX: Silences the dynamic interpreter discovery warnings across ALL execution phases
    ANSIBLE_INTERPRETER_PYTHON: auto_silent
    ANSIBLE_VAULT_PASSWORD_FILE: "${MOLECULE_PROJECT_DIRECTORY}/../.vault_pass"
  inventory:
    host_vars:
      ubuntu26-sandbox:
        ansible_python_interpreter: auto_silent
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
verifier:
  name: ansible
